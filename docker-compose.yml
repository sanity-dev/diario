services:
  microservicio-diario:
    build: .
    container_name: microservicio-diario
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      # Pasamos la conexión de Azure directa a Spring
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      
      # SOLUCIÓN AL ERROR: Pasamos las variables conflictivas como JSON
      # Esto inyecta jwt.secret y jwt.expiration correctamente en tu JwtService.java
      - SPRING_APPLICATION_JSON={"jwt.secret":"${JWT_SECRET}", "jwt.expiration":"${JWT_EXPIRATION}"}

    restart: unless-stopped