services:
  microservicio-diario:
    build: .
    container_name: microservicio-diario
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      # Pasamos la conexión de Azure directa a Spring
      # URL JDBC Completa (Esto es lo que Java necesita)
      - DB_URL=jdbc:sqlserver://sanity.database.windows.net:1433;database=micro-diario;user=Admin123@sanity;password=Password$;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;

      # Usuario y Contraseña mapeados a las variables correctas
      - DB_USERNAME=admin123@sanity
      - DB_PASSWORD=Password$

      # Seguridad JWT
      - JWT_SECRET=B8/aV2WyX9TCH+r0hLSOdZI4f5k6bEwnxJ3qM/o2u+A3cR9gHIV7yK0pLwU8iZ/jl+eS6wY5nB7tD/fRz8kE/g==
      # Valor en milisegundos (ejemplo: 1 día = 86400000)
      - JWT_EXPIRATION=86400000

    restart: unless-stopped